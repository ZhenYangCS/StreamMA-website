<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>StreamMA — Coming Soon</title>
<meta name="description" content="StreamMA: Streaming Communication in Multi-Agent Reasoning. The full project page will be released soon." />
<style>
  :root {
    --ink: #1f2937;
    --ink-soft: #475569;
    --accent: #2f9e6e;
    --bg-from: #f8fafc;
    --bg-to: #eef2f7;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, var(--bg-from) 0%, var(--bg-to) 100%);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 1.5rem;
  }
  .card {
    text-align: center;
    max-width: 560px;
    width: 100%;
    padding: 2.5rem 1.5rem;
  }
  .logo {
    width: 72px;
    height: 72px;
    margin-bottom: 1rem;
  }
  h1 {
    font-size: clamp(2rem, 6vw, 2.8rem);
    font-weight: 800;
    margin: 0 0 0.35rem 0;
    letter-spacing: -0.02em;
  }
  h1 .accent { color: var(--accent); }
  .subtitle {
    font-size: clamp(0.95rem, 2.4vw, 1.1rem);
    color: var(--ink-soft);
    margin: 0 0 2rem 0;
    line-height: 1.5;
  }
  .badge {
    display: inline-block;
    padding: 0.55rem 1.15rem;
    background: var(--accent);
    color: white;
    border-radius: 999px;
    font-size: 0.92rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    box-shadow: 0 4px 12px rgba(47, 158, 110, 0.25);
  }
  .footer {
    margin-top: 2.5rem;
    font-size: 0.82rem;
    color: #94a3b8;
  }
  .footer a {
    color: #94a3b8;
    text-decoration: none;
    border-bottom: 1px dotted #cbd5e1;
  }
  .footer a:hover { color: var(--accent); border-bottom-color: var(--accent); }
</style>
</head>
<body>
<main class="card">
  <!-- 4-color step ladder logo, consistent with project favicon -->
  <svg class="logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <rect x="6"  y="38" width="14" height="20" rx="2" fill="#1f6fb2"/>
    <rect x="20" y="30" width="14" height="28" rx="2" fill="#2f9e6e"/>
    <rect x="34" y="22" width="14" height="36" rx="2" fill="#e0a82e"/>
    <rect x="48" y="14" width="10" height="44" rx="2" fill="#e07a3a"/>
  </svg>
  <h1><span class="accent">Stream</span>MA</h1>
  <p class="subtitle">Streaming Communication in Multi-Agent Reasoning</p>
  <span class="badge">🚧 Project page coming soon</span>
  <p class="footer">© 2026 StreamMA authors</p>
</main>
</body>
</html>
